[tool:pytest]
# إعدادات pytest

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    unit: اختبارات الوحدة
    integration: اختبارات التكامل
    slow: اختبارات بطيئة
    async: اختبارات غير متزامنة
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
branch = True
source = backend
omit =
    */tests/*
    */migrations/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
